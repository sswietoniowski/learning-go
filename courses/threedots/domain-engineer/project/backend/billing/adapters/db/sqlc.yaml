version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "dbmodels"
        out: "dbmodels"
        sql_package: "pgx/v5"
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          # Map nullable timestamptz to *time.Time for optional timestamps (e.g., paid_at, deleted_at)
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true

          # Map non-nullable timestamptz to time.Time for required timestamps (e.g., created_at)
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"

          # Use shopspring/decimal instead of float64 for monetary amounts.
          # float64 has precision issues with decimal arithmetic (e.g., 0.1 + 0.2 != 0.3).
          # See: https://github.com/shopspring/decimal?tab=readme-ov-file#why-dont-you-just-use-float64
          - db_type: "pg_catalog.numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              type: "Decimal"

          - db_type: "uuid"
            nullable: false
            go_type:
              import: "eats/backend/common"
              type: "UUID"

          - db_type: "uuid"
            nullable: true
            go_type:
              import: "eats/backend/common"
              type: "NullUUID"

          - column: "billing.documents.document_uuid"
            go_type:
              import: "eats/backend/billing/domain"
              type: "DocumentUUID"

  - engine: "postgresql"
    queries: "query_test.sql"
    schema: "migrations"
    gen:
      go:
        package: "dbtests"
        out: "dbtests"
        sql_package: "pgx/v5"
